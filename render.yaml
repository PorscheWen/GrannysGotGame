services:
  - type: cron
    name: game-daily-push
    runtime: node
    schedule: "0 1 * * *"   # 台灣時間 09:00 (UTC+8)
    buildCommand: npm install --omit=dev
    startCommand: node push/daily_push.js
    envVars:
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_USER_ID
        sync: false
      - key: LIFF_ID
        sync: false
      - key: GAME_URL
        value: https://porschewenn.github.io/Game_trainig_elder/
