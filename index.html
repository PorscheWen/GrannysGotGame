<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="description" content="連阿嬤都贏你！翻牌記憶挑戰">
  <meta name="theme-color" content="#5B6EE8">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="阿嬤贏你">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>🃏 翻牌記憶</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
  <script src="config.js"></script>
</head>
<body>

  <header class="app-header">
    <button class="btn-back" onclick="location.href='games.html'">← 返回</button>
    <h1 class="app-title">🃏 翻牌記憶</h1>
    <div class="header-timer">⏱ <span id="timer">00:00</span></div>
  </header>

  <div class="stats-bar">
    <div class="stat-item">
      <span class="stat-label">翻牌</span>
      <span class="stat-value" id="flipCount">0</span>
    </div>
    <div class="stat-item">
      <span class="stat-label">配對</span>
      <span class="stat-value" id="pairsFound">0/0</span>
    </div>
    <div class="diff-tabs">
      <button class="diff-tab active" data-diff="easy">初級</button>
      <button class="diff-tab" data-diff="medium">中級</button>
      <button class="diff-tab" data-diff="hard">高級</button>
    </div>
  </div>

  <main class="game-main">
    <div class="game-board" id="gameBoard" role="main" aria-label="記憶遊戲牌局"></div>
  </main>

  <div class="control-bar">
    <button class="btn btn-restart" id="btnRestart">🔁 重新開始</button>
  </div>

  <!-- 勝利彈窗 -->
  <div class="win-overlay" id="winOverlay" role="dialog" aria-modal="true">
    <div class="win-panel">
      <div class="win-emoji">🎉</div>
      <h2 class="win-title">太棒了！</h2>
      <p class="win-subtitle">完成翻牌記憶！</p>
      <div class="win-stats">
        <div class="win-stat">
          <span class="win-stat-icon">⏱️</span>
          <span class="win-stat-label">完成時間</span>
          <span class="win-stat-value" id="winTime">--</span>
        </div>
        <div class="win-stat">
          <span class="win-stat-icon">🔄</span>
          <span class="win-stat-label">翻牌次數</span>
          <span class="win-stat-value" id="winFlips">--</span>
        </div>
        <div class="win-stat new-record" id="newRecordBadge" style="display:none">
          <span>🏆 新紀錄！</span>
        </div>
      </div>
      <div class="win-buttons">
        <button class="btn btn-share-line" id="btnShareLine">📤 分享成績</button>
        <button class="btn btn-play-again" id="btnPlayAgain">🔁 再玩一次</button>
      </div>
    </div>
  </div>

  <!-- 說明彈窗（fruit.html 樣式：首次進入顯示，置中） -->
  <div class="help-overlay" id="helpOverlay" role="dialog" aria-modal="true">
    <div class="help-panel">
      <h2>🃏 怎麼玩？</h2>
      <div class="help-steps">
        <div class="help-step">
          <span class="step-num">1</span>
          <p class="step-text">點擊任一張牌，翻開查看圖案</p>
        </div>
        <div class="help-step">
          <span class="step-num">2</span>
          <p class="step-text">再點另一張，試著找出相同圖案配對</p>
        </div>
        <div class="help-step">
          <span class="step-num">3</span>
          <p class="step-text">配對成功留在桌面，失敗則翻回背面，記住位置！</p>
        </div>
        <div class="help-step">
          <span class="step-num">4</span>
          <p class="step-text">全部配對完成就贏了！翻牌次數越少越厲害！</p>
        </div>
      </div>
      <button class="btn-got-it" id="btnGotIt">我知道了，開始翻牌！</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
