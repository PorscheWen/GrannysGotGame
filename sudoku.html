<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🔢 簡易數獨</title>
  <style>
    :root {
      --primary: #5B6EE8;
      --bg: #F4F6FF;
      --radius: 12px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: var(--bg); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; user-select: none; overflow: hidden; }

    /* Header */
    .app-header {
      position: fixed; top: 0; left: 0; right: 0; height: 64px; z-index: 100;
      background: var(--primary);
      display: flex; align-items: center; justify-content: space-between; padding: 0 14px;
      box-shadow: 0 2px 12px rgba(91,110,232,0.3);
    }
    .btn-back {
      background: rgba(255,255,255,0.2); border: none; border-radius: 10px;
      color: #fff; font-size: 1rem; padding: 8px 14px; cursor: pointer;
    }
    .app-title { color: #fff; font-size: 1.1rem; font-weight: 700; }
    .header-info { background: rgba(255,255,255,0.2); border-radius: 10px; color: #fff; font-size: 0.9rem; padding: 6px 12px; }
    .header-right { display:flex; flex-direction:column; align-items:center; gap:3px; }
    .timer-box { background:rgba(255,255,255,0.2); border-radius:10px; color:#fff; font-size:1rem; font-weight:700; padding:4px 10px; }
    .best-time-box { color:#fff; font-size:.75rem; opacity:.85; }

    /* Main area */
    .main-area {
      position: fixed; top: 64px; left: 0; right: 0; bottom: 80px;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 16px; padding: 12px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    /* Progress */
    .progress-bar {
      width: 100%; max-width: 380px;
      display: flex; align-items: center; justify-content: space-between;
      font-size: 0.95rem; color: #555577; font-weight: 600;
    }
    .progress-fill {
      height: 8px; background: #dde0f5; border-radius: 99px; flex: 1; margin: 0 12px;
    }
    .progress-inner {
      height: 100%; background: var(--primary); border-radius: 99px;
      transition: width 0.3s;
    }

    /* Grid */
    .grid-wrap {
      display: flex; align-items: center; justify-content: center;
    }
    .sudoku-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      border: 1px solid #b8c0eb;
      border-radius: 10px;
      overflow: hidden;
      gap: 0;
      width: min(calc(100vw - 24px), 380px);
    }
    .cell {
      aspect-ratio: 1;
      display: flex; align-items: center; justify-content: center;
      font-size: clamp(1.3rem, 6vw, 1.8rem);
      font-weight: 700;
      cursor: pointer;
      border: 1px solid #d8dcf0;
      background: #fff;
      position: relative;
      transition: background 0.12s;
    }

    .cell.given { background: #eef0fd; color: #2230a0; cursor: default; }
    .cell.selected { background: #c8d0fc !important; }
    .cell.highlight { background: #e8ebff; }
    .cell.conflict { color: #e74c3c !important; }
    .cell.user { color: var(--primary); }

    /* Numpad：2×3 網格，數字 1～6 重新排列（見 NUMPAD_ORDER） */
    .numpad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      width: min(calc(100vw - 24px), 380px);
    }
    .num-btn {
      width: 100%; min-height: 52px; border-radius: 12px;
      border: 2px solid #c8cef5; background: #fff;
      font-size: 1.4rem; font-weight: 700; color: var(--primary);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      box-shadow: 0 2px 6px rgba(91,110,232,0.1);
      transition: background 0.1s, transform 0.1s;
    }
    .num-btn:active { background: #e8ebff; transform: scale(0.92); }
    .num-btn.del {
      color: #e74c3c; border-color: #f5c8c8; font-size: 1.05rem;
      grid-column: 1 / -1;
      width: 100%;
      min-height: 48px;
    }

    /* 首次進入：遊戲講解 */
    .help-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.45);
      display: none; align-items: center; justify-content: center; z-index: 400;
      padding: 16px;
    }
    .help-overlay.show { display: flex; }
    .help-panel {
      background: #fff; border-radius: 20px; padding: 28px 22px;
      width: min(360px, 100%); max-height: min(85vh, 520px); overflow-y: auto;
      box-shadow: 0 12px 40px rgba(0,0,0,0.18);
    }
    .help-panel h2 { font-size: 1.25rem; color: var(--primary); margin-bottom: 14px; text-align: center; }
    .help-steps { display: flex; flex-direction: column; gap: 12px; margin-bottom: 18px; }
    .help-step {
      display: flex; gap: 10px; align-items: flex-start;
      font-size: 0.95rem; color: #444; line-height: 1.45;
    }
    .step-num {
      flex-shrink: 0; width: 26px; height: 26px; border-radius: 8px;
      background: var(--primary); color: #fff; font-size: 0.85rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
    }
    .btn-got-it {
      width: 100%; border: none; border-radius: 12px; padding: 14px;
      background: var(--primary); color: #fff; font-size: 1.05rem; font-weight: 700;
      cursor: pointer; box-shadow: 0 4px 14px rgba(91,110,232,0.35);
    }
    .btn-got-it:active { transform: scale(0.98); }

    /* Control bar */
    .control-bar {
      position: fixed; bottom: 0; left: 0; right: 0; height: 80px;
      background: #fff; box-shadow: 0 -2px 12px rgba(91,110,232,0.1);
      display: flex; align-items: center; justify-content: center; padding: 0 20px;
    }
    .btn-next {
      flex: 1; max-width: 300px; background: var(--primary); color: #fff;
      border: none; border-radius: 12px; font-size: 1.05rem; font-weight: 700;
      padding: 14px; cursor: pointer; box-shadow: 0 4px 14px rgba(91,110,232,0.3);
    }
    .btn-next:active { transform: scale(0.96); }

    /* Win overlay */
    .win-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      display: none; align-items: center; justify-content: center; z-index: 300;
    }
    .win-overlay.show { display: flex; }
    .win-panel {
      background: #fff; border-radius: 24px; padding: 36px 28px;
      width: min(340px, calc(100vw - 32px)); text-align: center;
    }
    .win-emoji { font-size: 4rem; margin-bottom: 12px; }
    .win-title { font-size: 1.8rem; font-weight: 800; color: var(--primary); margin-bottom: 8px; }
    .win-sub { font-size: 1rem; color: #666; margin-bottom: 6px; }
    .win-time { font-size: 1.2rem; font-weight: 700; color: var(--primary); margin-bottom: 4px; }
    .win-best { font-size: .9rem; color: #888; margin-bottom: 6px; }
    .win-new-badge { display:inline-block; background:#fff3cd; color:#b8860b; border-radius:8px; padding:4px 10px; font-size:.85rem; font-weight:700; margin-bottom:16px; }
    .btn-share-sudoku {
      width: 100%; background: #06C755; color: #fff;
      border: none; border-radius: 12px; font-size: 1.05rem; font-weight: 700;
      padding: 14px; cursor: pointer; margin-bottom: 10px;
    }
    .btn-win {
      width: 100%; background: var(--primary); color: #fff;
      border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 700;
      padding: 14px; cursor: pointer;
    }
  </style>
</head>
<body>

<header class="app-header">
  <button class="btn-back" onclick="location.href='games.html'">← 返回</button>
  <h1 class="app-title">🔢 簡易數獨</h1>
  <div class="header-right">
    <div class="timer-box" id="timerBox">⏱ 0:00</div>
    <div class="best-time-box" id="bestTimeBox">最佳 --:--</div>
  </div>
</header>

<div class="main-area">
  <div class="progress-bar">
    <span id="progressText">已填 0</span>
    <div class="progress-fill"><div class="progress-inner" id="progressInner" style="width:0%"></div></div>
    <span id="totalText">共 0 格</span>
  </div>

  <div class="grid-wrap">
    <div class="sudoku-grid" id="grid"></div>
  </div>

  <div class="numpad" id="numpad"></div>
</div>

<div class="control-bar">
  <button class="btn-next" id="btnNext">🔁 換一題</button>
</div>

<div class="help-overlay" id="helpOverlay" role="dialog" aria-modal="true" aria-labelledby="helpTitle">
  <div class="help-panel">
    <h2 id="helpTitle">🔢 簡易數獨怎麼玩？</h2>
    <div class="help-steps">
      <div class="help-step">
        <span class="step-num">1</span>
        <p>這是 <strong>6×6 數獨</strong>：每一<strong>橫列</strong>、每一<strong>直欄</strong>都要出現 <strong>1～6</strong> 各一次。</p>
      </div>
      <div class="help-step">
        <span class="step-num">2</span>
        <p>棋盤裡有塗灰的<strong>題目數字</strong>不能改；空白格才由你填入。</p>
      </div>
      <div class="help-step">
        <span class="step-num">3</span>
        <p>棋盤切成 <strong>六個長方形宮格</strong>（每宮 2 橫×3 直），每宮內也必須有 <strong>1～6</strong> 各一次。</p>
      </div>
      <div class="help-step">
        <span class="step-num">4</span>
        <p>先<strong>點選一格</strong>，再按下方<strong>數字鍵</strong>填入；若填錯與同行／同列／同宮重複，數字會變紅提示。</p>
      </div>
      <div class="help-step">
        <span class="step-num">5</span>
        <p>下方「⌫ 刪除」可清空該格。全部填對即過關！</p>
      </div>
    </div>
    <button type="button" class="btn-got-it" id="btnGotIt">我知道了，開始解題</button>
  </div>
</div>

<div class="win-overlay" id="winOverlay">
  <div class="win-panel">
    <div class="win-emoji">🎉</div>
    <div class="win-title">答對了！</div>
    <div class="win-sub" id="winSub">恭喜完成數獨！</div>
    <div class="win-time" id="winTime">用時 0:00</div>
    <div class="win-best" id="winBest">最佳紀錄：--:--</div>
    <div id="winNewBadge" class="win-new-badge" style="display:none">🏆 新紀錄！</div>
    <button class="btn-share-sudoku" id="btnShareSudoku">📤 分享成績</button>
    <button class="btn-win" id="btnWinNext">下一題 →</button>
  </div>
</div>

<script>
'use strict';

/** 下方數字鍵排列順序（仍為 1～6 各一顆，僅改順序與版面為 2×3） */
const NUMPAD_ORDER = [4, 1, 6, 2, 5, 3];
const HELP_SEEN_KEY = 'sudoku_help_seen_v1';

const PUZZLES = [
  {
    label: '第 1 題',
    solution: [[1,2,3,4,5,6],[4,5,6,1,2,3],[2,3,1,5,6,4],[5,6,4,2,3,1],[3,4,2,6,1,5],[6,1,5,3,4,2]],
    givens:   [[1,2,0,4,0,0],[4,0,6,0,2,0],[2,0,1,5,0,4],[5,6,0,0,3,1],[0,4,2,0,0,5],[0,1,5,3,0,2]]
  },
  {
    label: '第 2 題',
    solution: [[2,1,4,3,6,5],[3,6,5,2,1,4],[1,4,3,6,5,2],[6,5,2,1,4,3],[4,3,6,5,2,1],[5,2,1,4,3,6]],
    givens:   [[2,0,4,0,6,0],[0,6,0,2,0,4],[1,4,0,6,5,0],[0,5,2,0,4,3],[4,0,6,0,0,1],[5,0,0,4,3,0]]
  },
  {
    label: '第 3 題',
    solution: [[3,4,2,1,6,5],[1,6,5,3,4,2],[4,2,6,5,1,3],[5,1,3,4,2,6],[2,5,1,6,3,4],[6,3,4,2,5,1]],
    givens:   [[3,0,0,1,0,5],[0,6,0,0,4,0],[4,0,6,5,0,3],[0,1,0,0,2,6],[2,0,0,6,0,4],[0,0,4,0,5,1]]
  },
  {
    label: '第 4 題',
    solution: [[5,3,1,2,4,6],[2,4,6,5,3,1],[4,6,3,1,2,5],[1,2,5,4,6,3],[3,5,4,6,1,2],[6,1,2,3,5,4]],
    givens:   [[5,0,0,2,4,0],[0,4,6,0,0,1],[4,6,0,1,0,0],[0,0,5,4,6,0],[3,0,0,0,1,2],[0,1,2,0,0,4]]
  },
  {
    label: '第 5 題',
    solution: [[6,1,4,5,2,3],[5,2,3,6,1,4],[1,4,6,3,5,2],[3,5,2,1,4,6],[4,6,1,2,3,5],[2,3,5,4,6,1]],
    givens:   [[6,0,0,5,0,3],[0,2,0,0,1,0],[1,0,6,3,0,0],[0,5,0,0,4,6],[0,0,1,2,0,0],[2,3,0,0,0,1]]
  }
];

let currentIdx = 0;
let board = [];
let isGiven = [];
let selected = null;
let totalBlanks = 0;
let timerSec = 0;
let timerInterval = null;

const gridEl    = document.getElementById('grid');
const numpadEl  = document.getElementById('numpad');
const winOverlay= document.getElementById('winOverlay');

function fmtTime(s) {
  return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
}

function getBestKey(idx) { return `sudoku_best_${idx}`; }

function getBest(idx) {
  return parseInt(localStorage.getItem(getBestKey(idx)) || '0');
}

function updateBestDisplay(idx) {
  const b = getBest(idx);
  document.getElementById('bestTimeBox').textContent = b ? `最佳 ${fmtTime(b)}` : '最佳 --:--';
}

function startTimer() {
  clearInterval(timerInterval);
  timerSec = 0;
  document.getElementById('timerBox').textContent = '⏱ 0:00';
  timerInterval = setInterval(() => {
    timerSec++;
    document.getElementById('timerBox').textContent = `⏱ ${fmtTime(timerSec)}`;
  }, 1000);
}

function stopTimer() {
  clearInterval(timerInterval);
}

function loadPuzzle(idx) {
  const p = PUZZLES[idx];
  selected = null;
  board = p.givens.map(row => [...row]);
  isGiven = p.givens.map(row => row.map(v => v !== 0));
  totalBlanks = board.flat().filter(v => v === 0).length;
  renderGrid();
  renderNumpad();
  updateProgress();
  winOverlay.classList.remove('show');
  updateBestDisplay(idx);
  startTimer();
}

function getBox(r, c) { return Math.floor(r / 2) * 2 + Math.floor(c / 3); }

function hasConflict(r, c, val) {
  if (val === 0) return false;
  for (let i = 0; i < 6; i++) {
    if (i !== c && board[r][i] === val) return true;
    if (i !== r && board[i][c] === val) return true;
  }
  const br = Math.floor(r / 2) * 2, bc = Math.floor(c / 3) * 3;
  for (let dr = 0; dr < 2; dr++)
    for (let dc = 0; dc < 3; dc++)
      if ((br+dr !== r || bc+dc !== c) && board[br+dr][bc+dc] === val) return true;
  return false;
}

function renderGrid() {
  gridEl.innerHTML = '';
  for (let r = 0; r < 6; r++) {
    for (let c = 0; c < 6; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.r = r;
      cell.dataset.c = c;

      const v = board[r][c];
      cell.textContent = v || '';

      if (isGiven[r][c]) {
        cell.classList.add('given');
      } else if (v && hasConflict(r, c, v)) {
        cell.classList.add('user', 'conflict');
      } else if (v) {
        cell.classList.add('user');
      }

      if (selected) {
        if (selected.r === r && selected.c === c) {
          cell.classList.add('selected');
        } else if (selected.r === r || selected.c === c ||
                   getBox(selected.r, selected.c) === getBox(r, c)) {
          cell.classList.add('highlight');
        }
      }

      cell.addEventListener('click', () => onCellClick(r, c));
      gridEl.appendChild(cell);
    }
  }
}

function renderNumpad() {
  numpadEl.innerHTML = '';
  for (const n of NUMPAD_ORDER) {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'num-btn';
    btn.textContent = String(n);
    btn.addEventListener('click', () => onNumClick(n));
    numpadEl.appendChild(btn);
  }
  const del = document.createElement('button');
  del.type = 'button';
  del.className = 'num-btn del';
  del.textContent = '⌫ 刪除';
  del.addEventListener('click', () => onNumClick(0));
  numpadEl.appendChild(del);
}

function maybeShowHelp() {
  if (localStorage.getItem(HELP_SEEN_KEY)) return;
  document.getElementById('helpOverlay').classList.add('show');
}

function onCellClick(r, c) {
  if (isGiven[r][c]) { selected = null; renderGrid(); return; }
  selected = { r, c };
  renderGrid();
}

function onNumClick(n) {
  if (!selected) return;
  const { r, c } = selected;
  if (isGiven[r][c]) return;
  board[r][c] = n;
  renderGrid();
  updateProgress();
  checkWin();
}

function updateProgress() {
  const filled = board.flat().filter((v, i) => v !== 0 && !isGiven[Math.floor(i/6)][i%6]).length;
  const pct = totalBlanks > 0 ? (filled / totalBlanks * 100) : 0;
  document.getElementById('progressText').textContent = `已填 ${filled}`;
  document.getElementById('totalText').textContent = `共 ${totalBlanks} 格`;
  document.getElementById('progressInner').style.width = pct + '%';
}

function checkWin() {
  const sol = PUZZLES[currentIdx].solution;
  for (let r = 0; r < 6; r++)
    for (let c = 0; c < 6; c++)
      if (board[r][c] !== sol[r][c]) return;
  stopTimer();
  const elapsed = timerSec;
  const key = getBestKey(currentIdx);
  const prev = getBest(currentIdx);
  const isNew = !prev || elapsed < prev;
  if (isNew) {
    localStorage.setItem(key, elapsed);
    updateBestDisplay(currentIdx);
  }
  setTimeout(() => {
    document.getElementById('winSub').textContent = `第 ${currentIdx + 1} 題完成！太厲害了 👏`;
    document.getElementById('winTime').textContent = `用時 ${fmtTime(elapsed)}`;
    document.getElementById('winBest').textContent = `最佳紀錄：${fmtTime(isNew ? elapsed : prev)}`;
    document.getElementById('winNewBadge').style.display = isNew ? 'inline-block' : 'none';
    winOverlay.classList.add('show');
  }, 300);
}

function shareSudoku() {
  const elapsed = timerSec;
  const best = getBest(currentIdx);
  const txt = `🔢 簡易數獨 第${currentIdx+1}題\n完成時間：${fmtTime(elapsed)}\n最佳紀錄：${fmtTime(best)}\n\n來挑戰看看！👉 https://porschewen.github.io/GrannysGotGame/sudoku.html`;
  if (navigator.share) {
    navigator.share({ text: txt }).catch(() => {});
  } else {
    navigator.clipboard.writeText(txt).then(() => alert('成績已複製到剪貼簿！'));
  }
}

function nextPuzzle() {
  currentIdx = (currentIdx + 1) % PUZZLES.length;
  loadPuzzle(currentIdx);
}

document.getElementById('btnNext').addEventListener('click', () => { stopTimer(); nextPuzzle(); });
document.getElementById('btnWinNext').addEventListener('click', () => {
  winOverlay.classList.remove('show');
  nextPuzzle();
});
document.getElementById('btnShareSudoku').addEventListener('click', shareSudoku);

document.getElementById('btnGotIt').addEventListener('click', () => {
  localStorage.setItem(HELP_SEEN_KEY, '1');
  document.getElementById('helpOverlay').classList.remove('show');
});

loadPuzzle(0);
maybeShowHelp();
</script>
</body>
</html>
