<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#5B6EE8">
  <title>🔢 數字拼圖 2048</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; background: #F4F6FF; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; user-select: none; overflow: hidden; }

    .app-header {
      position: fixed; top: 0; left: 0; right: 0; height: 64px; z-index: 100;
      background: #5B6EE8; display: flex; align-items: center; justify-content: space-between;
      padding: 0 14px; box-shadow: 0 2px 12px rgba(91,110,232,0.3);
    }
    .btn-back {
      background: rgba(255,255,255,0.2); border: none; border-radius: 10px;
      color: #fff; font-size: 1rem; padding: 8px 14px; cursor: pointer; white-space: nowrap;
    }
    .app-title { color: #fff; font-size: 1.1rem; font-weight: 700; }
    .score-box {
      background: rgba(255,255,255,0.2); border-radius: 10px;
      color: #fff; font-size: 0.85rem; font-weight: 700;
      padding: 6px 10px; text-align: center; min-width: 72px;
    }
    .score-box span { display: block; font-size: 1.1rem; }

    .game-wrap {
      position: fixed; top: 64px; left: 0; right: 0; bottom: 80px;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px;
      padding: 8px;
    }

    .best-row {
      color: #555577; font-size: 0.95rem;
    }
    .best-row strong { color: #5B6EE8; }

    .board-bg {
      background: #bbada0; border-radius: 10px; padding: 8px;
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
      width: min(calc(100vw - 24px), 420px);
    }
    .cell-bg {
      aspect-ratio: 1; border-radius: 6px; background: rgba(238,228,218,0.35);
    }
    .board-layer {
      position: relative; margin-top: calc(-1 * (min(calc(100vw - 24px), 420px) + 16px));
      width: min(calc(100vw - 24px), 420px); height: min(calc(100vw - 24px), 420px);
      pointer-events: none;
    }
    .tile {
      position: absolute; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; transition: top 0.1s, left 0.1s;
    }
    .tile.new { animation: pop-in 0.18s ease; }
    .tile.merged { animation: merge-pop 0.18s ease; }
    @keyframes pop-in {
      0%   { transform: scale(0); }
      60%  { transform: scale(1.1); }
      100% { transform: scale(1); }
    }
    @keyframes merge-pop {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.18); }
      100% { transform: scale(1); }
    }

    .control-bar {
      position: fixed; bottom: 0; left: 0; right: 0; height: 80px;
      background: #fff; box-shadow: 0 -2px 12px rgba(91,110,232,0.1);
      display: flex; align-items: center; justify-content: center; padding: 0 20px;
    }
    .btn-restart {
      flex: 1; max-width: 360px; background: #5B6EE8; color: #fff;
      border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 700;
      padding: 14px; cursor: pointer; box-shadow: 0 4px 14px rgba(91,110,232,0.3);
    }
    .btn-restart:active { transform: scale(0.97); }

    /* overlay */
    .overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5);
      display: flex; align-items: center; justify-content: center; z-index: 300;
    }
    .overlay.hidden { display: none; }
    .panel {
      background: #fff; border-radius: 20px; padding: 28px 24px;
      width: min(340px, calc(100vw - 32px)); text-align: center;
    }
    .panel h2 { font-size: 1.6rem; margin-bottom: 10px; }
    .panel p  { font-size: 1rem; color: #555577; margin-bottom: 20px; line-height: 1.6; }
    .panel .result-score { font-size: 2rem; font-weight: 900; color: #5B6EE8; margin: 10px 0; }
    .btn-ok {
      background: #5B6EE8; color: #fff; border: none; border-radius: 12px;
      font-size: 1.05rem; font-weight: 700; padding: 14px 32px; cursor: pointer; width: 100%;
    }
    .help-step { display: flex; gap: 12px; margin-bottom: 12px; text-align: left; }
    .sn { background:#5B6EE8; color:#fff; border-radius:50%; width:28px; height:28px; min-width:28px; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:.9rem; }
    .st { font-size:.95rem; line-height:1.5; padding-top:4px; }
  </style>
</head>
<body>

<header class="app-header">
  <button class="btn-back" onclick="location.href='games.html'">← 返回</button>
  <h1 class="app-title">🔢 數字拼圖 2048</h1>
  <div class="score-box">分數<span id="scoreEl">0</span></div>
</header>

<div class="game-wrap">
  <div class="best-row">最高分：<strong id="bestEl">0</strong></div>
  <div class="board-bg" id="boardBg"></div>
  <div class="board-layer" id="boardLayer"></div>
</div>

<div class="control-bar">
  <button class="btn-restart" id="btnRestart">🔁 重新開始</button>
</div>

<!-- 說明 -->
<div class="overlay" id="helpOverlay">
  <div class="panel">
    <h2>🔢 怎麼玩？</h2>
    <div class="help-step"><span class="sn">1</span><p class="st">滑動螢幕（或按方向鍵）移動所有數字</p></div>
    <div class="help-step"><span class="sn">2</span><p class="st">相同數字碰在一起會合併，分數累加</p></div>
    <div class="help-step"><span class="sn">3</span><p class="st">合出 <strong>2048</strong> 就贏了！</p></div>
    <div class="help-step"><span class="sn">4</span><p class="st">無法移動時遊戲結束</p></div>
    <button class="btn-ok" id="btnGotIt">我知道了，開始玩！</button>
  </div>
</div>

<!-- 結果 -->
<div class="overlay hidden" id="resultOverlay">
  <div class="panel">
    <h2 id="resultTitle">🎉 你贏了！</h2>
    <p id="resultMsg">成功合出 2048！</p>
    <div class="result-score" id="resultScore">0</div>
    <button class="btn-ok" id="btnResultOk">再玩一次</button>
  </div>
</div>

<script>
'use strict';
const N = 4;
let board, score, best, won, over;

const scoreEl  = document.getElementById('scoreEl');
const bestEl   = document.getElementById('bestEl');
const boardBg  = document.getElementById('boardBg');
const boardLayer = document.getElementById('boardLayer');

const COLORS = {
  2:    { bg:'#eee4da', fg:'#776e65' },
  4:    { bg:'#ede0c8', fg:'#776e65' },
  8:    { bg:'#f2b179', fg:'#fff' },
  16:   { bg:'#f59563', fg:'#fff' },
  32:   { bg:'#f67c5f', fg:'#fff' },
  64:   { bg:'#f65e3b', fg:'#fff' },
  128:  { bg:'#edcf72', fg:'#fff' },
  256:  { bg:'#edcc61', fg:'#fff' },
  512:  { bg:'#edc850', fg:'#fff' },
  1024: { bg:'#edc53f', fg:'#fff' },
  2048: { bg:'#edc22e', fg:'#fff' },
};

function getColor(v) { return COLORS[v] || { bg:'#3c3a32', fg:'#fff' }; }

function init() {
  board = Array.from({length:N}, ()=>Array(N).fill(0));
  score = 0; won = false; over = false;
  best = parseInt(localStorage.getItem('game2048_best')||'0');
  bestEl.textContent = best;
  addRandom(); addRandom();
  buildBg(); render();
  document.getElementById('resultOverlay').classList.add('hidden');
}

function addRandom() {
  const empty = [];
  for (let r=0;r<N;r++) for (let c=0;c<N;c++) if (!board[r][c]) empty.push([r,c]);
  if (!empty.length) return null;
  const [r,c] = empty[Math.floor(Math.random()*empty.length)];
  board[r][c] = Math.random()<0.9 ? 2 : 4;
  return [r,c];
}

function buildBg() {
  boardBg.innerHTML = '';
  for (let i=0;i<N*N;i++) { const d=document.createElement('div'); d.className='cell-bg'; boardBg.appendChild(d); }
}

function cellSize() {
  const total = Math.min(window.innerWidth-24, 420);
  return (total - 16 - (N-1)*8) / N;
}
function cellOffset(idx) { return 8 + idx*(cellSize()+8); }

function render(newCell, mergedCells) {
  boardLayer.innerHTML = '';
  const cs = cellSize();
  for (let r=0;r<N;r++) for (let c=0;c<N;c++) {
    const v = board[r][c];
    if (!v) continue;
    const tile = document.createElement('div');
    tile.className = 'tile';
    const col = getColor(v);
    tile.style.cssText = `
      width:${cs}px; height:${cs}px;
      top:${cellOffset(r)}px; left:${cellOffset(c)}px;
      background:${col.bg}; color:${col.fg};
      font-size:${v>=1024?cs*0.28:cs*0.36}px;
    `;
    tile.textContent = v;
    const key = r*N+c;
    if (newCell && newCell[0]===r && newCell[1]===c) tile.classList.add('new');
    if (mergedCells && mergedCells.has(key)) tile.classList.add('merged');
    boardLayer.appendChild(tile);
  }
  scoreEl.textContent = score;
  if (score > best) { best=score; localStorage.setItem('game2048_best', best); bestEl.textContent=best; }
}

function slide(row) {
  let arr = row.filter(v=>v), added=new Set(), scoreGain=0, mergedIdx=new Set();
  for (let i=0;i<arr.length-1;i++) {
    if (arr[i]===arr[i+1] && !added.has(i)) {
      arr[i]*=2; scoreGain+=arr[i]; mergedIdx.add(i); arr.splice(i+1,1); added.add(i);
    }
  }
  while (arr.length<N) arr.push(0);
  return {arr, scoreGain, mergedIdx};
}

function move(dir) {
  if (over) return;
  let changed=false, mergedKeys=new Set();
  const prev = board.map(r=>[...r]);

  if (dir==='left'||dir==='right') {
    for (let r=0;r<N;r++) {
      let row = dir==='left' ? [...board[r]] : [...board[r]].reverse();
      const {arr,scoreGain,mergedIdx} = slide(row);
      if (dir==='right') arr.reverse();
      score+=scoreGain;
      mergedIdx.forEach(i=>{ const ci=dir==='right'?N-1-i:i; mergedKeys.add(r*N+ci); });
      board[r]=arr;
    }
  } else {
    for (let c=0;c<N;c++) {
      let col=[]; for(let r=0;r<N;r++) col.push(board[r][c]);
      if (dir==='down') col.reverse();
      const {arr,scoreGain,mergedIdx}=slide(col);
      if (dir==='down') arr.reverse();
      score+=scoreGain;
      mergedIdx.forEach(i=>{ const ri=dir==='down'?N-1-i:i; mergedKeys.add(ri*N+c); });
      for(let r=0;r<N;r++) board[r][c]=arr[r];
    }
  }

  for(let r=0;r<N;r++) for(let c=0;c<N;c++) if(board[r][c]!==prev[r][c]) { changed=true; break; }

  let newCell=null;
  if (changed) newCell=addRandom();
  render(newCell, mergedKeys);

  if (!won && board.flat().includes(2048)) { won=true; showResult(true); }
  else if (!canMove()) { over=true; showResult(false); }
}

function canMove() {
  for(let r=0;r<N;r++) for(let c=0;c<N;c++) {
    if(!board[r][c]) return true;
    if(c<N-1&&board[r][c]===board[r][c+1]) return true;
    if(r<N-1&&board[r][c]===board[r+1][c]) return true;
  }
  return false;
}

function showResult(win) {
  document.getElementById('resultTitle').textContent = win ? '🎉 你贏了！' : '😅 遊戲結束';
  document.getElementById('resultMsg').textContent   = win ? '成功合出 2048！連阿嬤都贏你！' : '無法繼續移動，再試一次！';
  document.getElementById('resultScore').textContent = score;
  document.getElementById('resultOverlay').classList.remove('hidden');
}

// keyboard
document.addEventListener('keydown', e=>{
  const map = {ArrowLeft:'left',ArrowRight:'right',ArrowUp:'up',ArrowDown:'down'};
  if (map[e.key]) { e.preventDefault(); move(map[e.key]); }
});

// touch
let tx=0, ty=0;
document.addEventListener('touchstart', e=>{ tx=e.touches[0].clientX; ty=e.touches[0].clientY; }, {passive:true});
document.addEventListener('touchend', e=>{
  const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
  if (Math.abs(dx)<30&&Math.abs(dy)<30) return;
  if (Math.abs(dx)>Math.abs(dy)) move(dx>0?'right':'left');
  else move(dy>0?'down':'up');
}, {passive:true});

document.getElementById('btnRestart').addEventListener('click', init);
document.getElementById('btnResultOk').addEventListener('click', ()=>{ document.getElementById('resultOverlay').classList.add('hidden'); init(); });
document.getElementById('btnGotIt').addEventListener('click', ()=>{ document.getElementById('helpOverlay').style.display='none'; });

window.addEventListener('resize', ()=>render());
init();
</script>
</body>
</html>
